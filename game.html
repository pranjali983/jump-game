<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jump vs Block</title>
    <style>
        * { padding: 0; margin: 0; }
        body {
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        #game {
            width: 500px;
            height: 200px;
            border-bottom: 2px solid #555;
            background-color: white;
            overflow: hidden;
            position: relative;
        }
        #character {
            width: 20px;
            height: 50px;
            background-color: #e67e22;
            position: absolute;
            top: 150px; /* Ground is at 200px - 50px height */
            left: 50px;
        }
        #block {
            width: 20px;
            height: 20px;
            background-color: #2c3e50;
            position: absolute;
            top: 180px;
            left: 480px;
        }
        .animate { animation: jump 0.5s linear; }
        @keyframes jump {
            0% { top: 150px; }
            30% { top: 100px; }
            70% { top: 100px; }
            100% { top: 150px; }
        }
        .blockMove { animation: block 1.5s infinite linear; }
        @keyframes block {
            0% { left: 500px; }
            100% { left: -20px; }
        }
        h2 { margin-bottom: 10px; color: #333; }
        p { margin-top: 10px; color: #777; }
    </style>
</head>
<body onclick="jump()">

    <h2>Score: <span id="scoreSpan">0</span></h2>
    <div id="game">
        <div id="character"></div>
        <div id="block" class="blockMove"></div>
    </div>
    <p>Click or Tap to Jump!</p>

    <script>
        const character = document.getElementById("character");
        const block = document.getElementById("block");
        const scoreSpan = document.getElementById("scoreSpan");
        let score = 0;

        function jump() {
            if (character.classList != "animate") {
                character.classList.add("animate");
                setTimeout(function() {
                    character.classList.remove("animate");
                }, 500);
            }
        }

        const checkDead = setInterval(function() {
            let characterTop = parseInt(window.getComputedStyle(character).getPropertyValue("top"));
            let blockLeft = parseInt(window.getComputedStyle(block).getPropertyValue("left"));

            // Collision Detection
            if (blockLeft < 70 && blockLeft > 50 && characterTop >= 130) {
                block.style.animation = "none";
                block.style.display = "none";
                alert("Game Over! Score: " + Math.floor(score/10));
                location.reload();
            } else {
                score++;
                scoreSpan.innerHTML = Math.floor(score / 10);
            }
        }, 10);
    </script>
</body>
</html>
